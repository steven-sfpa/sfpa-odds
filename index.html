<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SFPA City Championship — Title Odds</title>
<style>
  :root{--ink:#0B1F3A;--gold:#C8A24B;--green:#1B7A43;--lb:#9C6B2E;--grey:#F3F4F6;
        --line:#e4e7eb;--muted:#5a6472;--bg:#fafbfc;--red:#B23A3A}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:0 20px 90px}
  nav{position:sticky;top:0;z-index:30;background:rgba(250,251,252,.95);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  nav .inner{max-width:900px;margin:0 auto;padding:10px 20px;display:flex;gap:18px;overflow-x:auto;font-size:13px}
  nav a{color:var(--muted);text-decoration:none;white-space:nowrap;font-weight:500}
  nav a:hover{color:var(--green)}
  header.hero{padding:38px 0 18px;border-bottom:3px solid var(--gold)}
  h1{font-size:30px;margin:0 0 6px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:15px}
  .updated{font-size:13px;color:var(--muted);margin-top:10px}
  section{padding:30px 0;border-bottom:1px solid var(--line)}
  h2{font-size:21px;margin:0 0 4px}
  h3{font-size:15px;margin:18px 0 4px;color:var(--green)}
  .lead{font-size:16.5px;margin:8px 0 16px}
  p{margin:10px 0}
  .small{font-size:12.5px;color:var(--muted);margin-top:8px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .card .lab{font-size:12.5px;color:var(--muted)}
  .card .val{font-size:26px;font-weight:600;margin-top:2px}
  .card .val small{font-size:13px;font-weight:500;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  th{background:var(--ink);color:#fff;text-align:left;padding:9px 11px;font-size:12px;font-weight:600}
  th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
  td{padding:8px 11px;border-top:1px solid var(--line)}
  tr.fav td{background:#FBF1D6}
  tr.fav td:first-child{font-weight:700}
  .seed{display:inline-block;min-width:21px;height:21px;line-height:21px;text-align:center;background:var(--grey);border-radius:50%;font-size:11px;color:var(--muted);margin-right:7px}
  .chartbox{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin:16px 0}
  .heat{width:100%;border-collapse:collapse;font-size:13px;margin:14px 0}
  .heat th{background:transparent;color:var(--muted);font-weight:600;text-align:center;padding:6px}
  .heat td{text-align:center;padding:7px 6px;border:1px solid #fff;font-variant-numeric:tabular-nums}
  .heat td.tm{text-align:left;background:#fff!important;font-weight:500}
  .bracket-scroll{overflow-x:auto;padding-bottom:8px}
  .bcols{display:flex;gap:10px;min-width:780px;align-items:stretch}
  .bcol{display:flex;flex-direction:column;justify-content:space-around;gap:8px;flex:1;min-width:128px}
  .bcol h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 2px;text-align:center}
  .match{background:#fff;border:1px solid var(--line);border-radius:7px;overflow:hidden;font-size:12px}
  .mrow{display:flex;justify-content:space-between;padding:4px 7px;border-bottom:1px solid var(--line)}
  .mrow:last-child{border-bottom:none}
  .mrow.w{background:#FBF1D6;font-weight:700}
  .mrow .sc{color:var(--muted);font-variant-numeric:tabular-nums}
  .mrow.w .sc{color:var(--gold)}
  .band{font-size:12px;font-weight:600;margin:18px 0 8px;padding:4px 10px;border-radius:6px;display:inline-block}
  .band.wb{background:#eef4ff;color:var(--ink)}
  .band.lb{background:#f6ecdd;color:var(--lb)}
  .gf{background:#FBF3DA;border:2px solid var(--gold);border-radius:12px;padding:16px;text-align:center;margin:18px 0}
  .gf .champ{font-size:20px;font-weight:700;margin-top:4px}
  .gf .champ .t{color:var(--gold)}
  .snaps{list-style:none;padding:0;margin:12px 0 0}
  .snaps li{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;padding:11px 15px}
  .snaps a{color:var(--ink);text-decoration:none;font-weight:600}
  .snaps a:hover{color:var(--green)}
  .snaps .dl{color:var(--green);font-size:13px}
  .appendix{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px}
  footer{padding:26px 0;font-size:12.5px;color:var(--muted)}
  .err{background:#fdecea;border:1px solid #f5c2c0;color:#9b2c2c;padding:14px;border-radius:10px;margin:30px 0}
  @media(max-width:560px){h1{font-size:24px}.hide-sm{display:none}td,th{padding:7px 8px;font-size:13px}}
</style>

<body>
<nav><div class="inner">
  <a href="#odds">Title odds</a><a href="#recap">Last week</a><a href="#storylines">Storylines</a><a href="#movement">Odds over time</a><a href="#power">Team Elo</a>
  <a href="#bracket">Bracket</a><a href="#equity">Survival</a><a href="#method">Method</a>
  <a href="#form">Season form</a><a href="#pdf">PDFs</a>
</div></nav>

<div class="wrap">
  <header class="hero">
    <h1>City Championship — Title Odds</h1>
    <div class="sub" id="season">SFPA Spring 2026</div>
    <div class="updated" id="updated"></div>
  </header>
  <div id="content"><p class="small">Loading the latest numbers…</p></div>
  <footer id="footer"></footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var GOLD="#C8A24B",GREEN="#1B7A43",INK="#0B1F3A",STEEL="#7d8aa0",MUTED="#5a6472",RED="#B23A3A";
var LINE=["#0B1F3A","#C8A24B","#1B7A43","#B23A3A","#534AB7","#1D9E75"];
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function pct(p){return p==null?"—":(+p).toFixed(1)+"%";}
function p0(p){return p==null?"—":Math.round(+p)+"%";}
function ss(n){return '<span class="seed">'+n+'</span>';}
function short(n){var m={'Happy Lounge Rawhides':'Rawhides','El Farolito Shooters':'El Farolito','Pilsner InnDecisives':'Pilsner','Bus Stop Flyers':'Bus Stop',"Marcelo's Hall Stars":"Marcelo's",'Lucky Horseshoe Glue Factory':'LH Glue Factory','Route 101 Dalmatians':'Route 101','Friends Crooked Cues':'Friends Cues','Temple Holy Smokes':'Temple',"Karl’s Freakin’ Beacon":"Karl's",'Lower Haight Misfits':'Lower Haight','Pocket Full of Fizz':'Pocket Fizz','Bus Slop':'Bus Slop','Hall Monitors':'Hall Monitors','Happy HALLers':'Happy HALLers','Gino & Carlo':'Gino & Carlo'};return m[n]||n;}

function render(d){
  var t=d.teams, t3=t.slice(0,3);
  document.getElementById('season').textContent=d.season;
  document.getElementById('updated').innerHTML='Updated <b>'+d.updated+'</b> · 60,000-run double-elimination simulation';
  document.getElementById('footer').innerHTML='Model: best-lineup Fargo + lineup-adjusted season form + a data-tested playoff pedigree for Pilsner; per-game odds capped for pool variance; race-to-9 matches with an 8-8 tiebreaker; 60,000-run double-elimination Monte Carlo. Pool is high-variance — these are probabilities, not predictions. Updates as playoff results post.';
  var h="";

  /* ODDS */
  h+='<section id="odds"><h2>Who wins the City Championship</h2>'
   +'<div style="display:inline-flex;align-items:center;gap:7px;background:#FBF1D6;border:1px solid '+GOLD+';border-radius:8px;padding:5px 11px;font-size:12.5px;color:'+INK+';margin:6px 0 4px;">'
     +'<span style="width:7px;height:7px;border-radius:50%;background:'+GREEN+';display:inline-block"></span>'
     +'<span>Latest update: <b>'+(d.updated_full||d.updated)+'</b></span></div>'
   +'<p class="lead"><b>'+esc(short(t3[0].team))+'</b> are the favorite at <b>'+p0(t3[0].title)+'</b>, ahead of a tight chase between <b>'+esc(short(t3[1].team))+'</b> ('+p0(t3[1].title)+') and <b>'+esc(short(t3[2].team))+'</b> ('+p0(t3[2].title)+'). Together the top three hold ~'+Math.round(t3[0].title+t3[1].title+t3[2].title)+'% of all title equity.</p>'
   +'<div class="cards">'
     +'<div class="card"><div class="lab">Favorite</div><div class="val">'+p0(t3[0].title)+'</div><div class="small">'+esc(short(t3[0].team))+'</div></div>'
     +'<div class="card"><div class="lab">2nd</div><div class="val">'+p0(t3[1].title)+'</div><div class="small">'+esc(short(t3[1].team))+'</div></div>'
     +'<div class="card"><div class="lab">3rd</div><div class="val">'+p0(t3[2].title)+'</div><div class="small">'+esc(short(t3[2].team))+'</div></div>'
   +'</div>'
   +'<div class="chartbox"><canvas id="oddsChart" role="img" aria-label="Title odds bar chart"></canvas></div>';
  var rows=t.map(function(x,i){
    return '<tr class="'+(i===0?'fav':'')+'"><td>'+ss(x.seed)+esc(x.team)+'</td>'
      +'<td class="num">'+pct(x.title)+'</td><td class="num hide-sm">'+pct(x.final)+'</td><td class="num hide-sm">'+pct(x.sf)+'</td></tr>';
  }).join('');
  h+='<table><thead><tr><th>Team</th><th class="num">Title %</th><th class="num hide-sm">Reach final</th><th class="num hide-sm">Reach semis</th></tr></thead><tbody>'+rows+'</tbody></table></section>';

  /* WEEKLY RECAP */
  if(d.recap && d.recap.results && d.recap.results.length){
    var rc=d.recap;
    var rr=rc.results.map(function(m){
      var up=m.upset;
      return '<tr'+(up?' style="background:#FBF1D6"':'')+'><td>('+m.w_seed+') <b>'+esc(short(m.winner))+'</b> def. ('+m.l_seed+') '+esc(short(m.loser))+'</td>'
        +'<td class="num">'+m.score+'</td><td class="small">'+(up?'⚡ upset':(m.margin===1?'nail-biter':''))+'</td></tr>';
    }).join('');
    var article=(rc.article&&rc.article.length)
      ? rc.article.map(function(p,i){return '<p'+(i===0?' class="lead"':'')+'>'+esc(p)+'</p>';}).join('')
      : '<p class="lead">Results are in for '+esc(rc.session)+'.</p>';
    h+='<section id="recap"><h2>Last week: '+esc(rc.session)+'</h2>'+article
     +'<table style="margin-top:14px"><thead><tr><th>Result</th><th class="num">Score</th><th></th></tr></thead><tbody>'+rr+'</tbody></table>'
     +'<p class="small">Winner\'s game count shown first. ⚡ marks a lower seed beating a higher seed.</p></section>';
  }

  /* STORYLINES */
  var sl=d.storylines||{};
  h+='<section id="storylines"><h2>The storylines</h2>';
  // 1. Pilsner — the dynasty's other half
  if(sl.pilsner){var pl=sl.pilsner;
   h+='<h3>Pilsner: '+pl.vs_nonrawhides+' in the playoffs against everyone but Rawhides</h3>'
    +'<p>The most remarkable number in this whole field belongs to a 6-seed. Over the last four City Championships, <b>Pilsner InnDecisives have gone '+pl.playoff_record+' in playoff matches</b> — and <b>every single one of their losses</b> has come against one team: the Happy Lounge Rawhides. Against the other fifteen teams they\'ve faced in the playoffs, Pilsner is a perfect <b>'+pl.vs_nonrawhides+'</b>. They\'ve reached the final four years running. This is why a team seeded sixth is the model\'s <b>#2 title pick at '+p0(pl.title)+'</b>: the regular season undersells them, and the data knows it.</p>';
  }
  // 2. The Burgess effect — why Pilsner is "only" a 6-seed
  h+='<h3>The Burgess effect: why Pilsner slipped to the 6-seed</h3>'
   +'<p>So why isn\'t Pilsner seeded higher? Because their best player, <b>Evan Burgess (576 Fargo), didn\'t play until Week 7</b> — he missed the entire first half of the season. Pilsner won 57% of their games without him and 61% with him; that early-season dip is exactly enough to have dropped them several seed lines, landing them at sixth. Now he\'s back and the lineup is whole again — but the seeding is already locked. And that one fact ripples through the entire bracket, as the next storyline shows.</p>';
  // 3. The lopsided bracket
  if(sl.bracket_halves){var bh=sl.bracket_halves;
   h+='<h3>One half of the bracket is a war; the other is a stroll</h3>'
    +'<p>The 6-seed lands Pilsner in the <b>bottom half — alongside El Farolito (2) and Bus Stop (3)</b>. Three of the four strongest non-Rawhides teams are stacked in the same half, forced to knock each other out just to reach the final. Rawhides\' top half, by contrast, is far softer. The survival numbers tell the story plainly: <b>Rawhides reach the final '+p0(bh.rawhides_reach_final)+'</b> of the time, while <b>El Farolito and Pilsner sit near '+p0(bh.elfarolito_reach_final)+'</b> — not because they\'re weak, but because their path is brutal. Had Burgess played all season and Pilsner seeded into Rawhides\' half instead, this bracket would look completely different.</p>';
  }
  // 4. Rawhides — dominant on paper, beatable in practice
  if(sl.rawhides){var rh=sl.rawhides;
   h+='<h3>Rawhides: so good on paper it barely matters that they\'ve cooled off</h3>'
    +'<p>Here\'s the paradox of the favorite. By <b>season form, Rawhides actually graded out slightly negative ('+rh.form.toFixed(0)+')</b> — they won a touch less than even their own loaded lineup predicted. And yet they\'re still the runaway #1 at '+p0(rh.title)+', because their <b>Fargo ('+rh.fargo+') and Team Elo ('+rh.team_elo+') tower over the field</b> by enough that a small slump simply doesn\'t move them. But "favorite" isn\'t "lock": these playoff matches are races to 9, and Pilsner alone has taken them to the brink repeatedly — Rawhides hold a 7-2 edge in their nine playoff meetings, but two of those went Pilsner\'s way. An undefeated run is rare. With more strong teams in the field than ever, the favorite will be tested.</p>';
  }
  // 5. El Farolito — the form team
  if(sl.elfarolito){var ef=sl.elfarolito;
   h+='<h3>El Farolito: the team playing above its paper</h3>'
    +'<p>If one team is quietly dangerous, it\'s El Farolito. They posted the <b>best season form in the field (+'+ef.form.toFixed(0)+')</b> — they consistently won more than their roster\'s raw Fargo said they should, the signature of a team that\'s peaking at the right time. The model rewards that, lifting them into a co-#2 tie at '+p0(ef.title)+'. The catch is the draw: they\'re in the loaded bottom half, so even a hot team faces the gauntlet of Pilsner and Bus Stop before any shot at Rawhides.</p>';
  }
  h+='</section>';

  /* MOVEMENT (time-series) */
  h+='<section id="movement"><h2>Title odds over time</h2>'
   +'<p>Each team\'s championship odds, re-computed after every play session (Tuesdays = winners\' bracket, Thursdays = losers\' bracket). A line can stay flat on a day a team didn\'t play — and can still move if the field around it changes (e.g. a contender knocked out early). The chart starts at the seeded draw and fills in as the playoffs unfold.</p>'
   +'<div class="chartbox"><canvas id="tsChart" role="img" aria-label="Title odds over time line chart"></canvas></div>'
   + (d.timeseries.length<=1 ? '<p class="small">Only the seeded starting point exists so far — the playoffs haven\'t begun. Lines will appear here as results come in.</p>' : '');

  /* POWER (Team Elo) */
  var pr=t.slice().sort(function(a,b){return b.team_elo-a.team_elo;}).map(function(x){
    return '<tr><td>'+ss(x.seed)+esc(x.team)+'</td><td class="num">'+x.team_elo+'</td><td class="num">'+x.top4_fargo+'</td><td class="num hide-sm">'+pct(x.title)+'</td></tr>';
  }).join('');
  h+='<section id="power"><h2>Team Elo — overall strength</h2>'
   +'<p>Each team\'s strength rating: the Fargo of their best playoff lineup, adjusted for how they actually played this season, plus a data-tested pedigree where earned. Higher = stronger. This is what drives the title odds above.</p>'
   +'<table><thead><tr><th>Team</th><th class="num">Team Elo</th><th class="num">Top-4 Fargo</th><th class="num hide-sm">Title %</th></tr></thead><tbody>'+pr+'</tbody></table></section>';

  /* BRACKET */
  h+='<section id="bracket"><h2>Projected bracket</h2>'
   +'<p>The single most-likely path through the 16-team double-elimination bracket. Lose on the A-side (winners\') and you drop to the B-side (losers\'); a second loss ends your run. The B-side survivor must beat the A-side finalist twice in the grand final.</p>'
   + '<div id="bracketSvg" class="bracket-scroll" style="min-width:0"></div>'
   +'<p class="small">This is one most-likely tournament out of 60,000 simulated. The title odds above come from all of them — so a team\'s odds and its place in this single bracket can differ.</p></section>';

  /* EQUITY heatmap */
  h+='<section id="equity"><h2>How far each team survives</h2>'
   +'<p>Share of simulations in which each team is still alive at each stage. Double-elimination means a team stays "alive" on either side until its second loss.</p>'
   + heatmap(t)+'</section>';

  /* METHOD */
  var ped=d.pedigree_note, bt=d.backtest||{};
  h+='<section id="method"><h2>How these numbers were built</h2>'
   +'<h3>1. A rating for every team — based on who actually plays</h3>'
   +'<p>Each team is rated by the Fargo (skill) ratings of its players. But here\'s the part most models get wrong: a team\'s performance is judged against <i>the lineup it actually fielded each match</i>, not its best-case roster. If a team rests a star or plays a weaker substitute who performs exactly at their own level, the model doesn\'t punish them for it — it expected less, and got it. Concretely: when a 405-rated depth player loses most of his games against 600-rated opponents, that\'s a neutral result, not a black mark. Most rating systems can\'t tell "played badly" apart from "fielded a weaker lineup." This one can, because it reads every individual player\'s result in every match.</p>'
   +'<h3>2. Turning ratings into win probabilities — and proving they work</h3>'
   +'<p>Playoff matches are a <b>race to 9</b>: the two teams play individual games until one side reaches 9 wins, and the match stops there (a 9-3 match is over after 12 games — scores need not add to 16). The Fargo gap between the two lineups sets each game\'s win chance, capped so no single game is treated as more lopsided than 75/25 — pool has too much variance for locks. We play the race out game by game; if it reaches 8-8, one deciding game is played between each team\'s highest-Fargo player. <b>And we back-tested it.</b> Run against this season\'s actual results, the engine correctly called <b>'+bt.accuracy+'% of '+bt.n+' matches</b> (Brier score '+bt.brier+' — well better than a coin flip), and its confidence levels are well-calibrated. That hit-rate is the basis for trusting the odds.</p>'
   +'<div class="chartbox"><canvas id="calibChart" role="img" aria-label="Calibration chart: predicted vs actual win rate"></canvas></div>'
   +'<p class="small">Calibration: each dot is a confidence bucket. When the model says "70% to win," teams in that bucket should win about 70% of the time — and they land near the dashed line of perfect calibration. A model can be accurate but overconfident; this one isn\'t.</p>'
   +'<h3>3. Simulating the tournament 60,000 times</h3>'
   +'<p>Title odds aren\'t a guess. We play out the full 16-team double-elimination bracket — winners\' side, losers\' (B-side), and the grand final where the B-side team must win twice — <b>60,000 times</b>, every match a game-by-game race to 9 with the 8-8 tiebreaker, and count how often each team wins. Every number in this report — title odds, the survival percentages, the projected bracket — comes from this one simulation, so they\'re all mutually consistent.</p>'
   +'<h3>4. Did history matter? We measured it, instead of guessing</h3>'
   +'<p>Pilsner and Rawhides have met in the City Championship final four straight seasons — a pattern a single-season model can\'t see, which argues for a "pedigree" weight. But rather than set that weight by feel, we tested it against four seasons of real playoff results. The finding was decisive: <b>Pilsner\'s playoff record is '+esc((ped.basis||'').split(',')[0])+'</b>, and every one of their losses came against Rawhides — against everyone else they are a perfect 15-0. That overperformance is statistically real (it beats a coin-flip baseline at p&lt;0.05), so Pilsner carries a measured <b>+'+ped.bump_fargo+' Fargo</b> playoff bump. <b>No other team earned one</b> — Rawhides\' four titles are just the league\'s best team doing what the best team should, already captured by their rating.</p>'
   +'<p class="small">Every adjustment in this report has a number behind it, not a feel. Pool is high-variance, so treat these as probabilities, not predictions — even a clear favorite loses far more often than it wins.</p></section>';

  /* SEASON FORM (appendix) */
  var fr=t.slice().sort(function(a,b){return b.season_form-a.season_form;}).map(function(x){
    var col=x.season_form>5?GREEN:(x.season_form<-5?RED:MUTED), tag=x.season_form>5?'over':(x.season_form<-5?'under':'~ as expected');
    return '<tr><td>'+ss(x.seed)+esc(x.team)+'</td><td class="num" style="color:'+col+';font-weight:600">'+(x.season_form>0?'+':'')+x.season_form.toFixed(1)+'</td><td style="color:'+col+';font-size:12px">'+tag+'</td></tr>';
  }).join('');
  h+='<section id="form"><h2>Appendix — season form</h2>'
   +'<p class="small">A supporting metric, not a strength rating. It measures whether a team beat or missed its <i>own roster\'s</i> Fargo expectation this season, match by match. A strong team can show negative form if it underplayed its talent — so read this as "who\'s hot / who underdelivered," not "who\'s best."</p>'
   +'<div class="appendix"><table><thead><tr><th>Team</th><th class="num">Form</th><th>vs roster</th></tr></thead><tbody>'+fr+'</tbody></table></div></section>';

  /* PDFs */
  var snaps=d.snapshots||[];
  var sn=snaps.length?'<ul class="snaps">'+snaps.map(function(s,i){return '<li><span><a href="'+encodeURI(s.file)+'">📄 '+s.date+' snapshot</a>'+(i===0?'<span style="font-size:11px;background:'+GREEN+';color:#fff;padding:1px 7px;border-radius:9px;margin-left:6px">LATEST</span>':'')+'</span><a class="dl" href="'+encodeURI(s.file)+'">Open PDF →</a></li>';}).join('')+'</ul>':'<p class="small">A dated PDF snapshot will appear here each time the report updates.</p>';
  h+='<section id="pdf" style="border-bottom:none"><h2>Printable snapshots</h2><p>Each update saves a permanent dated PDF of the full report.</p>'+sn+'</section>';

  document.getElementById('content').innerHTML=h;
  drawOdds(t); drawTimeseries(d.timeseries); drawCalib(d.backtest);
  fetch('bracket.svg?'+Date.now()).then(function(r){return r.ok?r.text():'';}).then(function(svg){
    var el=document.getElementById('bracketSvg'); if(el&&svg){el.innerHTML='<div style="min-width:1042px">'+svg+'</div>';}
  });
}

function heatmap(teams){
  function cell(v){var a=Math.max(0,Math.min(100,v))/100;return '<td style="background:rgba(27,122,67,'+(0.07+a*0.62).toFixed(2)+');color:'+(a>0.55?'#fff':INK)+'">'+Math.round(v)+'%</td>';}
  var rows=teams.map(function(t){return '<tr><td class="tm">'+ss(t.seed)+esc(short(t.team))+'</td>'+cell(t.qf)+cell(t.sf)+cell(t.final)+'<td style="font-weight:700;background:rgba(200,162,75,.18)">'+pct(t.title)+'</td></tr>';}).join('');
  return '<div style="overflow-x:auto"><table class="heat"><thead><tr><th style="text-align:left">Team</th><th>Reach QF</th><th>Reach semis</th><th>Reach final</th><th>Win title</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function bracketHtml(b){
  function match(m){var aw=m.win===m.a,bw=m.win===m.b,p=m.score.split('-');
    return '<div class="match"><div class="mrow '+(aw?'w':'')+'"><span>('+m.as+') '+esc(short(m.a))+'</span><span class="sc">'+p[0]+'</span></div><div class="mrow '+(bw?'w':'')+'"><span>('+m.bs+') '+esc(short(m.b))+'</span><span class="sc">'+p[1]+'</span></div></div>';}
  function col(t,a){return '<div class="bcol"><h4>'+t+'</h4>'+a.map(match).join('')+'</div>';}
  var wb='<div class="band wb">Winners\' bracket · A-side</div><div class="bracket-scroll"><div class="bcols">'+col('Round 1',b.wb_r1)+col('Quarters',b.wb_qf)+col('Semis',b.wb_sf)+col('WB Final',[b.wb_final])+'</div></div>';
  var lb='<div class="band lb">Losers\' bracket · B-side</div><div class="bracket-scroll"><div class="bcols">'+col('LB R1',b.lb_r1)+col('LB R2',b.lb_r2)+col('LB R3',b.lb_r3)+col('LB R4',b.lb_r4)+col('LB R5',[b.lb_r5])+col('B-side final',[b.lb_r6])+'</div></div>';
  var g=b.grand_final;
  var gf='<div class="gf"><div class="small">GRAND FINAL · ('+g.a_seed+') '+esc(short(g.a_side))+' vs ('+g.b_seed+') '+esc(short(g.b_side))+' · '+g.score+'</div><div class="champ"><span class="t">🏆</span> '+esc(short(g.champion))+'</div><div class="small">A-side finalist needs one win; B-side challenger must win twice.</div></div>';
  return wb+lb+gf;
}
function drawOdds(teams){
  var top=teams.filter(function(t){return t.title>=0.3;}),ctx=document.getElementById('oddsChart');if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels:top.map(function(t){return short(t.team);}),datasets:[{data:top.map(function(t){return t.title;}),backgroundColor:top.map(function(t,i){return i===0?GOLD:(i<4?GREEN:STEEL);}),borderRadius:4}]},
    options:{indexAxis:'y',plugins:{legend:{display:false},title:{display:true,text:'Title probability (%)',color:MUTED}},scales:{x:{ticks:{color:MUTED},grid:{color:'#eee'}},y:{ticks:{color:INK},grid:{display:false}}},responsive:true,maintainAspectRatio:false}});
  ctx.parentNode.style.height=(top.length*30+60)+'px';
}
function drawCalib(bt){
  var ctx=document.getElementById('calibChart');if(!ctx||!bt||!bt.calibration)return;
  var pts=bt.calibration.map(function(c){return {x:c.pred,y:c.actual};});
  new Chart(ctx,{data:{datasets:[
    {type:'scatter',label:'Model',data:pts,backgroundColor:GREEN,pointRadius:5},
    {type:'line',label:'Perfect calibration',data:[{x:0,y:0},{x:100,y:100}],borderColor:'#bbb',borderDash:[5,5],pointRadius:0,fill:false}]},
    options:{plugins:{legend:{labels:{color:MUTED,boxWidth:12}},title:{display:true,text:'Predicted win % vs. actual win %',color:MUTED}},
      scales:{x:{min:0,max:100,title:{display:true,text:'Model predicted',color:MUTED},ticks:{color:MUTED}},y:{min:0,max:100,title:{display:true,text:'Actually won',color:MUTED},ticks:{color:MUTED}}},
      responsive:true,maintainAspectRatio:false}});
  ctx.parentNode.style.height='320px';
}
function drawTimeseries(ts){
  var ctx=document.getElementById('tsChart');if(!ctx)return;
  // top 6 teams by latest odds
  var latest=ts[ts.length-1].odds;
  var teams=Object.keys(latest).sort(function(a,b){return latest[b]-latest[a];}).slice(0,6);
  var labels=ts.map(function(s){return s.label;});
  var datasets=teams.map(function(tm,i){return {label:short(tm),data:ts.map(function(s){return s.odds[tm];}),
    borderColor:LINE[i%LINE.length],backgroundColor:LINE[i%LINE.length],tension:.2,pointRadius:ts.length<=1?5:3,borderWidth:2};});
  new Chart(ctx,{type:'line',data:{labels:labels,datasets:datasets},
    options:{plugins:{legend:{labels:{color:MUTED,boxWidth:12,font:{size:12}}},title:{display:true,text:'Championship odds by play session (%)',color:MUTED}},
      scales:{y:{beginAtZero:true,ticks:{color:MUTED,callback:function(v){return v+'%';}},grid:{color:'#eee'}},x:{ticks:{color:INK},grid:{display:false}}},
      responsive:true,maintainAspectRatio:false}});
  ctx.parentNode.style.height='340px';
}

fetch('report.json?'+Date.now()).then(function(r){if(!r.ok)throw new Error('report.json not found');return r.json();}).then(render)
  .catch(function(e){document.getElementById('content').innerHTML='<div class="err">Could not load the latest data ('+e.message+'). If just published, refresh in a minute.</div>';});
</script>
